services:
  adguardhome:
    image: adguard/adguardhome
    container_name: adguardhome
    restart: unless-stopped
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "81:81/tcp"
      - "3006:3000/tcp"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:81"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
